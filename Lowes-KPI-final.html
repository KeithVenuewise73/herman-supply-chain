// ─── Utilities ────────────────────────────────────────────────────────────
const toNum = (v) => {
  if (v === null || v === undefined || v === "") return null;
  const n = parseFloat(String(v).replace(/[%,]/g, ""));
  return isNaN(n) ? null : n;
};
const excelDate = (serial) => {
  if (!serial) return null;
  if (typeof serial === "string" && serial.includes("/")) return serial;
  if (typeof serial === "number") {
    const date = new Date((serial - 25569) * 86400 * 1000);
    return date.toLocaleDateString("en-US");
  }
  return String(serial);
};
const parseStoreName = (raw) => {
  if (!raw) return { number: "", name: String(raw || "") };
  const s = String(raw).trim();
  const m = s.match(/^(\d+)\s*[-–]\s*(.+)$/);
  if (m) return { number: m[1], name: m[2].trim() };
  return { number: "", name: s };
};
const normalizeName = (n) => String(n || "").toLowerCase().replace(/[^a-z0-9]/g, "").trim();
const colorForScore = (score) => {
  if (score === null || score === undefined) return "#64748b";
  if (score >= 95) return "#22c55e";
  if (score >= 90) return "#eab308";
  return "#ef4444";
};
const bgForScore = (score) => {
  if (score === null || score === undefined) return "";
  if (score >= 95) return "rgba(34,197,94,0.15)";
  if (score >= 90) return "rgba(234,179,8,0.15)";
  return "rgba(239,68,68,0.15)";
};
const calcLTR = (responses) => {
  const total = responses.length;
  if (!total) return { strict: null, neutral: null, count910: 0, count8: 0, count07: 0, total: 0 };
  const count910 = responses.filter((r) => r >= 9).length;
  const count8 = responses.filter((r) => r === 8).length;
  const count07 = responses.filter((r) => r <= 7).length;
  const strict = (count910 / total) * 100;
  const denomNeutral = total - count8;
  const neutral = denomNeutral === 0 ? null : (count910 / denomNeutral) * 100;
  return { strict, neutral, count910, count8, count07, total };
};
const compositeScore = (row, useNeutral = false) => {
  const comp = toNum(row.completion) ?? 0;
  const otiw = toNum(row.onTimeInWindow) ?? 0;
  const ot = toNum(row.onTime) ?? 0;
  const ltr = useNeutral ? (row.ltrNeutral ?? 0) : (row.ltrStrict ?? 0);
  const redel = toNum(row.redeliveryPct) ?? 0;
  return comp * 0.25 + otiw * 0.25 + ot * 0.2 + ltr * 0.2 - redel * 0.1;
};

// ─── Excel Parser ─────────────────────────────────────────────────────────
const parseFiles = (kpiFile, ltrFile) => {
  const wb1 = XLSX.read(kpiFile, { type: "array" });
  const wb2 = XLSX.read(ltrFile, { type: "array" });
  const spSheet = wb1.Sheets["SP Weekly Summary"];
  const speSheet = wb1.Sheets["SPE Weekly Summary"];
  const spData = spSheet ? XLSX.utils.sheet_to_json(spSheet, { defval: "" }) : [];
  const speData = speSheet ? XLSX.utils.sheet_to_json(speSheet, { defval: "" }) : [];
  const ltrSheet = wb2.Sheets["LTR Data"] || wb2.Sheets[wb2.SheetNames[0]];
  const ltrRaw = ltrSheet ? XLSX.utils.sheet_to_json(ltrSheet, { defval: "" }) : [];

  const normKPI = (rows, isDriver) =>
    rows.map((r) => {
      const keys = Object.keys(r);
      const get = (...candidates) => {
        for (const c of candidates) {
          const k = keys.find((k) => k.toLowerCase().replace(/[^a-z0-9]/g, "").includes(c.toLowerCase().replace(/[^a-z0-9]/g, "")));
          if (k !== undefined) return r[k];
        }
        return "";
      };
      return {
        weekEnding: excelDate(get("weekending", "week")),
        carrier: String(get("carrier") || "").trim(),
        speName: isDriver ? String(get("spename", "spe", "driver") || "").trim() : "",
        region: String(get("region") || "").trim(),
        district: String(get("district") || "").trim(),
        routes: toNum(get("routes")),
        plannedStops: toNum(get("plannedstops", "planned")),
        actualStops: toNum(get("actualstops", "actual")),
        avgStops: toNum(get("avgstops", "avg")),
        redeliveries: toNum(get("redeliveries", "redelivery")),
        completion: toNum(get("completion")),
        onTimeInWindow: toNum(get("ontimeinwindow", "inwindow")),
        onTime: toNum(get("ontime")),
        redeliveryPct: toNum(get("redelivery%", "redel")),
      };
    });

  const spRows = normKPI(spData, false);
  const speRows = normKPI(speData, true);

  const ltrRows = ltrRaw.map((r) => {
    const keys = Object.keys(r);
    const get = (...c) => {
      for (const cand of c) {
        const k = keys.find((k) => k.toLowerCase().replace(/[^a-z0-9]/g, "").includes(cand.toLowerCase().replace(/[^a-z0-9]/g, "")));
        if (k !== undefined) return r[k];
      }
      return "";
    };
    const ltrVal = toNum(get("likelihoodtorecommend", "ltr", "likelihood"));
    const store = parseStoreName(get("store"));
    return {
      store, ltr: ltrVal,
      contractorCarrier: String(get("contractorcarrier", "driver", "spe") || "").trim(),
      carrier: String(get("carrier") || "").trim(),
      detractor: String(get("detractor") || "").trim(),
      deliveryDate: excelDate(get("deliverydate", "date")),
      improvementComment: String(get("improvementcomment", "improvement") || "").trim(),
      followUpComment: String(get("commentsaftertalking", "followup", "comment") || "").trim(),
    };
  }).filter((r) => r.ltr !== null);

  return { spRows, speRows, ltrRows };
};

// ─── Supabase Sync ────────────────────────────────────────────────────────
const syncToSupabase = async (spRows, speRows, ltrRows, onProgress) => {
  onProgress("Clearing old data...");
  await supabase.from("ltr_data").delete().neq("id", 0);
  await supabase.from("kpi_sp_weekly").delete().neq("id", 0);
  await supabase.from("kpi_spe_weekly").delete().neq("id", 0);

  onProgress("Uploading LTR data...");
  const ltrBatch = ltrRows.map((r) => ({
    store_number: r.store.number, store_name: r.store.name, ltr_score: r.ltr,
    contractor_carrier: r.contractorCarrier, carrier: r.carrier, detractor: r.detractor,
    delivery_date: r.deliveryDate, improvement_comment: r.improvementComment,
    follow_up_comment: r.followUpComment,
  }));
  for (let i = 0; i < ltrBatch.length; i += 500) await supabase.from("ltr_data").insert(ltrBatch.slice(i, i + 500));

  onProgress("Uploading carrier KPI data...");
  const spBatch = spRows.map((r) => ({
    week_ending: r.weekEnding, carrier: r.carrier, region: r.region, district: r.district,
    routes: r.routes, planned_stops: r.plannedStops, actual_stops: r.actualStops, avg_stops: r.avgStops,
    redeliveries: r.redeliveries, completion_pct: r.completion, on_time_in_window_pct: r.onTimeInWindow,
    on_time_pct: r.onTime, redelivery_pct: r.redeliveryPct,
  }));
  for (let i = 0; i < spBatch.length; i += 500) await supabase.from("kpi_sp_weekly").insert(spBatch.slice(i, i + 500));

  onProgress("Uploading driver KPI data...");
  const speBatch = speRows.map((r) => ({
    week_ending: r.weekEnding, carrier: r.carrier, spe_name: r.speName, region: r.region, district: r.district,
    routes: r.routes, planned_stops: r.plannedStops, actual_stops: r.actualStops, avg_stops: r.avgStops,
    redeliveries: r.redeliveries, completion_pct: r.completion, on_time_in_window_pct: r.onTimeInWindow,
    on_time_pct: r.onTime, redelivery_pct: r.redeliveryPct,
  }));
  for (let i = 0; i < speBatch.length; i += 500) await supabase.from("kpi_spe_weekly").insert(speBatch.slice(i, i + 500));

  onProgress("Done!");
};

const loadFromSupabase = async () => {
  const [ltrRes, spRes, speRes] = await Promise.all([
    supabase.from("ltr_data").select("*"),
    supabase.from("kpi_sp_weekly").select("*"),
    supabase.from("kpi_spe_weekly").select("*"),
  ]);
  const ltrRows = (ltrRes.data || []).map((r) => ({
    store: { number: r.store_number || "", name: r.store_name || "" }, ltr: r.ltr_score,
    contractorCarrier: r.contractor_carrier || "", carrier: r.carrier || "", detractor: r.detractor || "",
    deliveryDate: r.delivery_date || "", improvementComment: r.improvement_comment || "",
    followUpComment: r.follow_up_comment || "",
  }));
  const spRows = (spRes.data || []).map((r) => ({
    weekEnding: r.week_ending, carrier: r.carrier || "", region: r.region || "", district: r.district || "",
    routes: r.routes, plannedStops: r.planned_stops, actualStops: r.actual_stops, avgStops: r.avg_stops,
    redeliveries: r.redeliveries, completion: r.completion_pct, onTimeInWindow: r.on_time_in_window_pct,
    onTime: r.on_time_pct, redeliveryPct: r.redelivery_pct,
  }));
  const speRows = (speRes.data || []).map((r) => ({
    weekEnding: r.week_ending, carrier: r.carrier || "", speName: r.spe_name || "", region: r.region || "",
    district: r.district || "", routes: r.routes, plannedStops: r.planned_stops, actualStops: r.actual_stops,
    avgStops: r.avg_stops, redeliveries: r.redeliveries, completion: r.completion_pct,
    onTimeInWindow: r.on_time_in_window_pct, onTime: r.on_time_pct, redeliveryPct: r.redelivery_pct,
  }));
  return { spRows, speRows, ltrRows };
};

const KPICard = ({ label, value, sub, color }) => (

const SortIcon = ({ col, sortCol, sortDir }) => {
  if (sortCol !== col) return <span style={{ color: "#475569", marginLeft: 4 }}>↕</span>;
  return <span style={{ color: "#38bdf8", marginLeft: 4 }}>{sortDir === "asc" ? "↑" : "↓"}</span>;
};
const useSortable = (data, defaultCol) => {
  const [sortCol, setSortCol] = useState(defaultCol);
  const [sortDir, setSortDir] = useState("desc");
  const sort = (col) => {
    if (col === sortCol) setSortDir((d) => (d === "asc" ? "desc" : "asc"));
    else { setSortCol(col); setSortDir("desc"); }
  };
  const sorted = useMemo(() => [...data].sort((a, b) => {
    const av = a[sortCol], bv = b[sortCol];
    if (av === null || av === undefined) return 1;
    if (bv === null || bv === undefined) return -1;
    const cmp = typeof av === "string" ? av.localeCompare(bv) : av - bv;
    return sortDir === "asc" ? cmp : -cmp;
  }), [data, sortCol, sortDir]);
  return { sorted, sortCol, sortDir, sort };
};

      {sel("weekEnding", "Weeks")}{sel("carrier", "Carriers")}{sel("region", "Regions")}{sel("district", "Districts")}

};
const exportCSV = (rows, filename) => {
  if (!rows.length) return;
  const keys = Object.keys(rows[0]);
  const csv = [keys.join(","), ...rows.map((r) => keys.map((k) => JSON.stringify(r[k] ?? "")).join(","))].join("\n");
  const a = document.createElement("a");
  a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
  a.download = filename;
  a.click();
};

// ─── Build Rows ───────────────────────────────────────────────────────────
const buildDriverRows = (speRows, ltrRows, useNeutral) => {
  const map = {};
  speRows.forEach((r) => {
    const key = normalizeName(r.speName + r.carrier);
    if (!map[key]) map[key] = { ...r, ltrResponses: [] };
    ["routes", "plannedStops", "actualStops", "redeliveries"].forEach((f) => { map[key][f] = (map[key][f] || 0) + (r[f] || 0); });
    ["completion", "onTimeInWindow", "onTime", "redeliveryPct"].forEach((f) => {
      map[key]["_sum_" + f] = (map[key]["_sum_" + f] || 0) + (r[f] || 0);
      map[key]["_cnt_" + f] = (map[key]["_cnt_" + f] || 0) + 1;
    });
  });
  ltrRows.forEach((r) => {
    const normCC = normalizeName(r.contractorCarrier);
    const key = Object.keys(map).find((k) => {
      const speN = normalizeName(map[k].speName);
      return normCC && speN && (speN.includes(normCC) || normCC.includes(speN));
    });
    if (key) map[key].ltrResponses.push(r.ltr);
  });
  return Object.values(map).map((r) => {
    const avg = (f) => r["_cnt_" + f] ? r["_sum_" + f] / r["_cnt_" + f] : null;
    const ltr = calcLTR(r.ltrResponses);
    const row = {
      name: r.speName, carrier: r.carrier, region: r.region, district: r.district, weekEnding: r.weekEnding,
      routes: r.routes, plannedStops: r.plannedStops, actualStops: r.actualStops, completion: avg("completion"),
      onTimeInWindow: avg("onTimeInWindow"), onTime: avg("onTime"), redeliveryPct: avg("redeliveryPct"),
      ltrTotal: ltr.total, ltrCount910: ltr.count910, ltrCount8: ltr.count8, ltrCount07: ltr.count07,
      ltrStrict: ltr.strict, ltrNeutral: ltr.neutral, lowSample: ltr.total < 5,
    };
    row.composite = compositeScore(row, useNeutral);
    return row;
  }).sort((a, b) => (b.composite || 0) - (a.composite || 0)).map((r, i) => ({ ...r, rank: i + 1 }));
};
const buildCarrierRows = (spRows, ltrRows, useNeutral) => {
  const map = {};
  spRows.forEach((r) => {
    const key = normalizeName(r.carrier);
    if (!map[key]) map[key] = { ...r, ltrResponses: [] };
    ["routes", "plannedStops", "actualStops", "redeliveries"].forEach((f) => { map[key][f] = (map[key][f] || 0) + (r[f] || 0); });
    ["completion", "onTimeInWindow", "onTime", "redeliveryPct"].forEach((f) => {
      map[key]["_sum_" + f] = (map[key]["_sum_" + f] || 0) + (r[f] || 0);
      map[key]["_cnt_" + f] = (map[key]["_cnt_" + f] || 0) + 1;
    });
  });
  ltrRows.forEach((r) => {
    const normC = normalizeName(r.carrier);
    const key = Object.keys(map).find((k) => k === normC || k.includes(normC) || normC.includes(k));
    if (key) map[key].ltrResponses.push(r.ltr);
  });
  return Object.values(map).map((r) => {
    const avg = (f) => r["_cnt_" + f] ? r["_sum_" + f] / r["_cnt_" + f] : null;
    const ltr = calcLTR(r.ltrResponses);
    const row = {
      carrier: r.carrier, region: r.region, district: r.district, weekEnding: r.weekEnding,
      routes: r.routes, plannedStops: r.plannedStops, actualStops: r.actualStops, completion: avg("completion"),
      onTimeInWindow: avg("onTimeInWindow"), onTime: avg("onTime"), redeliveryPct: avg("redeliveryPct"),
      ltrTotal: ltr.total, ltrCount910: ltr.count910, ltrCount8: ltr.count8, ltrCount07: ltr.count07,
      ltrStrict: ltr.strict, ltrNeutral: ltr.neutral, lowSample: ltr.total < 5,
    };
    row.composite = compositeScore(row, useNeutral);
    return row;
  }).sort((a, b) => (b.composite || 0) - (a.composite || 0)).map((r, i) => ({ ...r, rank: i + 1 }));
};
const buildStoreRows = (ltrRows) => {
  const map = {};
  ltrRows.forEach((r) => {
    const key = r.store.number || r.store.name;
    if (!map[key]) map[key] = { store: r.store, ltrResponses: [], detractors: [], comments: [] };
    map[key].ltrResponses.push(r.ltr);
    if (r.detractor) map[key].detractors.push(r.detractor);
    if (r.improvementComment) map[key].comments.push(r.improvementComment);
  });
  return Object.values(map).map((r) => {
    const ltr = calcLTR(r.ltrResponses);
    const detCounts = {};
    r.detractors.forEach((d) => { detCounts[d] = (detCounts[d] || 0) + 1; });
    const topDet = Object.entries(detCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || "—";
    return {
      storeNum: r.store.number, storeName: r.store.name, ltrTotal: ltr.total, ltrCount910: ltr.count910,
      ltrCount8: ltr.count8, ltrCount07: ltr.count07, ltrStrict: ltr.strict, ltrNeutral: ltr.neutral,
      detractorCount: r.detractors.length, topDetractor: topDet, lowSample: ltr.total < 5, comments: r.comments,
    };
  }).sort((a, b) => (b.ltrStrict || 0) - (a.ltrStrict || 0)).map((r, i) => ({ ...r, rank: i + 1 }));
};

// ─── Upload Page ──────────────────────────────────────────────────────────
const UploadPage = ({ onLoad }) => {
  const [kpiFile, setKpiFile] = useState(null);
  const [ltrFile, setLtrFile] = useState(null);
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [progress, setProgress] = useState("");
  const [loadingDB, setLoadingDB] = useState(false);

  const readFile = (file) => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = (e) => res(new Uint8Array(e.target.result));
    r.onerror = rej;
    r.readAsArrayBuffer(file);
  });

  const handleLoad = async () => {
    if (!kpiFile || !ltrFile) { setError("Please upload both files."); return; }
    setLoading(true); setError(""); setProgress("Parsing Excel files...");
    try {
      const [kpi, ltr] = await Promise.all([readFile(kpiFile), readFile(ltrFile)]);
      const data = parseFiles(kpi, ltr);
      setProgress("Syncing to Supabase...");
      await syncToSupabase(data.spRows, data.speRows, data.ltrRows, setProgress);
      onLoad(data);
    } catch (e) { setError("Error: " + e.message); }
    setLoading(false); setProgress("");
  };

  const handleLoadFromDB = async () => {
    setLoadingDB(true); setError("");
    try {
      const data = await loadFromSupabase();
      if (!data.ltrRows.length && !data.spRows.length) setError("No data found in database. Please upload Excel files first.");
      else onLoad(data);
    } catch (e) { setError("Error loading from database: " + e.message); }
    setLoadingDB(false);
  };

  const DropZone = ({ label, file, onFile }) => {
    const ref = useRef();
    return (
      <div onClick={() => ref.current.click()} onDragOver={(e) => e.preventDefault()} onDrop={(e) => { e.preventDefault(); onFile(e.dataTransfer.files[0]); }}
        style={{ border: "2px dashed #334155", borderRadius: 12, padding: "40px 24px", textAlign: "center", cursor: "pointer", background: file ? "rgba(56,189,248,0.05)" : "#0f172a", borderColor: file ? "#38bdf8" : "#334155" }}>
        <input ref={ref} type="file" accept=".xlsx,.xls" style={{ display: "none" }} onChange={(e) => onFile(e.target.files[0])} />
        <div style={{ fontSize: 32, marginBottom: 8 }}>📊</div>
        <div style={{ color: file ? "#38bdf8" : "#64748b", fontWeight: 600 }}>{file ? file.name : label}</div>
        <div style={{ color: "#475569", fontSize: 12, marginTop: 4 }}>Click or drag & drop .xlsx</div>
      </div>
    );
  };

  return (
    <div style={{ maxWidth: 700, margin: "40px auto", padding: "0 20px" }}>
      <h2 style={{ color: "#f1f5f9", fontSize: 22, marginBottom: 8 }}>Upload / Refresh Data</h2>
      <p style={{ color: "#64748b", marginBottom: 24 }}>Upload your Excel files to sync fresh data to Supabase, or load the last saved dataset.</p>
      <div style={{ background: "#0f172a", border: "1px solid #1e3a5f", borderRadius: 12, padding: 20, marginBottom: 28, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ color: "#38bdf8", fontWeight: 600, marginBottom: 4 }}>📦 Load from Supabase</div>
          <div style={{ color: "#64748b", fontSize: 13 }}>Load the last uploaded dataset without re-uploading files</div>
        </div>
        <button onClick={handleLoadFromDB} disabled={loadingDB} style={{ background: "linear-gradient(90deg,#0369a1,#1d4ed8)", color: "#fff", border: "none", borderRadius: 8, padding: "10px 24px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
          {loadingDB ? "Loading..." : "Load Data"}
        </button>
      </div>
      <div style={{ color: "#475569", textAlign: "center", marginBottom: 20, fontSize: 13 }}>— or upload new Excel files —</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 24 }}>
        <DropZone label="Lowe's Carrier KPI (.xlsx)" file={kpiFile} onFile={setKpiFile} />
        <DropZone label="LTR Detractor Sheet (.xlsx)" file={ltrFile} onFile={setLtrFile} />
      </div>
      {progress && <div style={{ background: "#1e293b", borderRadius: 8, padding: "10px 16px", marginBottom: 16, color: "#38bdf8", fontSize: 13 }}>⏳ {progress}</div>}
      {error && <div style={{ color: "#f87171", marginBottom: 16, fontSize: 13 }}>⚠ {error}</div>}
      <button onClick={handleLoad} disabled={loading} style={{ background: "linear-gradient(90deg,#0ea5e9,#3b82f6)", color: "#fff", border: "none", borderRadius: 8, padding: "12px 32px", fontSize: 15, fontWeight: 600, cursor: "pointer", width: "100%" }}>
        {loading ? progress || "Processing…" : "Upload & Sync to Supabase"}
      </button>
    </div>
  );
};

const ExecutiveSummary = ({ spRows, speRows, ltrRows, useNeutral }) => {
  const driverRows = useMemo(() => buildDriverRows(speRows, ltrRows, useNeutral), [speRows, ltrRows, useNeutral]);
  const carrierRows = useMemo(() => buildCarrierRows(spRows, ltrRows, useNeutral), [spRows, ltrRows, useNeutral]);
  const totalLTR = ltrRows.length;
  const ltr910 = ltrRows.filter((r) => r.ltr >= 9).length;
  const ltr8 = ltrRows.filter((r) => r.ltr === 8).length;
  const ltr07 = ltrRows.filter((r) => r.ltr <= 7).length;
  const strictOverall = totalLTR ? ((ltr910 / totalLTR) * 100).toFixed(1) : "N/A";
  const neutDenom = totalLTR - ltr8;
  const neutralOverall = neutDenom > 0 ? ((ltr910 / neutDenom) * 100).toFixed(1) : "N/A";
  const detMap = {};
  ltrRows.forEach((r) => { if (r.detractor) detMap[r.detractor] = (detMap[r.detractor] || 0) + 1; });
  const detData = Object.entries(detMap).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value).slice(0, 8);
  const ltrDist = [
    { name: "10", value: ltrRows.filter((r) => r.ltr === 10).length },
    { name: "9", value: ltrRows.filter((r) => r.ltr === 9).length },
    { name: "8", value: ltr8 },
    { name: "7-", value: ltr07 },
  ];
  const top10D = driverRows.slice(0, 10);
  const bot10D = [...driverRows].sort((a, b) => (a.composite || 0) - (b.composite || 0)).slice(0, 10);
  const top10C = carrierRows.slice(0, 10);
  const bot10C = [...carrierRows].sort((a, b) => (a.composite || 0) - (b.composite || 0)).slice(0, 10);
  const MiniTable = ({ rows, nameKey, title }) => (
    <div style={{ background: "#0f172a", borderRadius: 10, padding: 16, border: "1px solid #1e293b" }}>
      <div style={{ color: "#94a3b8", fontSize: 12, fontWeight: 600, marginBottom: 10, textTransform: "uppercase", letterSpacing: 0.5 }}>{title}</div>
      {rows.map((r, i) => (
        <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid #1e293b" }}>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}><span style={{ color: "#475569", fontSize: 11, minWidth: 20 }}>#{r.rank}</span><span style={{ color: "#e2e8f0", fontSize: 13 }}>{r[nameKey] || "—"}</span></div>
          <span style={{ color: colorForScore(r.composite), fontWeight: 700, fontSize: 13 }}>{r.composite !== null ? r.composite.toFixed(1) : "—"}</span>
        </div>
      ))}
    </div>
  );
  return (
    <div>
      <h2 style={{ color: "#f1f5f9", fontSize: 20, fontWeight: 700, marginBottom: 20 }}>Executive Summary</h2>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 12, marginBottom: 24 }}>
        <KPICard label="Total LTR Responses" value={totalLTR} color="#38bdf8" />
        <KPICard label="Strict LTR Score" value={strictOverall + "%"} color="#22c55e" sub="9-10 / Total" />
        <KPICard label="Neutral LTR Score" value={neutralOverall + "%"} color="#818cf8" sub="9-10 / (Total − 8s)" />
        <KPICard label="Promoters (9-10)" value={ltr910} color="#22c55e" />
        <KPICard label="Neutrals (8)" value={ltr8} color="#eab308" />
        <KPICard label="Detractors (0-7)" value={ltr07} color="#ef4444" />
        <KPICard label="Active Drivers" value={speRows.length} color="#38bdf8" />
        <KPICard label="Active Carriers" value={carrierRows.length} color="#fb923c" />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 24 }}>
        <div style={{ background: "#0f172a", borderRadius: 10, padding: 16, border: "1px solid #1e293b" }}>
          <div style={{ color: "#94a3b8", fontSize: 12, fontWeight: 600, marginBottom: 12, textTransform: "uppercase", letterSpacing: 0.5 }}>LTR Distribution</div>
          <div style={{ display: "flex", alignItems: "flex-end", gap: 16, height: 180, padding: "0 8px" }}>
            {ltrDist.map((d, i) => {
              const max = Math.max(...ltrDist.map((x) => x.value), 1);
              const barColor = ["#22c55e", "#4ade80", "#eab308", "#ef4444"][i];
              const heightPct = (d.value / max) * 100;
              return (
                <div key={d.name} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end", height: "100%" }}>
                  <div style={{ color: "#cbd5e1", fontSize: 12, fontWeight: 700, marginBottom: 6 }}>{d.value}</div>
                  <div style={{ width: "100%", maxWidth: 56, background: barColor, borderRadius: "4px 4px 0 0", height: `${Math.max(heightPct, 2)}%`, transition: "height .3s" }} />
                  <div style={{ color: "#64748b", fontSize: 12, marginTop: 8 }}>{d.name}</div>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{ background: "#0f172a", borderRadius: 10, padding: 16, border: "1px solid #1e293b" }}>
          <div style={{ color: "#94a3b8", fontSize: 12, fontWeight: 600, marginBottom: 12, textTransform: "uppercase", letterSpacing: 0.5 }}>Top Detractor Categories</div>
          <div style={{ height: 180, overflowY: "auto", paddingRight: 4 }}>
            {detData.length === 0 && <div style={{ color: "#475569", fontSize: 13, paddingTop: 20, textAlign: "center" }}>No detractor data</div>}
            {detData.map((d, i) => {
              const total = detData.reduce((s, x) => s + x.value, 0) || 1;
              const pct = (d.value / total) * 100;
              const barColor = CHART_COLORS[i % CHART_COLORS.length];
              return (
                <div key={d.name} style={{ marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                    <span style={{ color: "#cbd5e1" }}>{d.name}</span>
                    <span style={{ color: "#94a3b8" }}>{d.value} ({pct.toFixed(0)}%)</span>
                  </div>
                  <div style={{ background: "#1e293b", borderRadius: 4, height: 8, overflow: "hidden" }}>
                    <div style={{ background: barColor, height: "100%", width: `${pct}%`, borderRadius: 4 }} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 16 }}>
        <MiniTable rows={top10D} nameKey="name" title="Top 10 Drivers" />
        <MiniTable rows={bot10D} nameKey="name" title="Bottom 10 Drivers" />
        <MiniTable rows={top10C} nameKey="carrier" title="Top 10 Carriers" />
        <MiniTable rows={bot10C} nameKey="carrier" title="Bottom 10 Carriers" />
      </div>
    </div>
  );
};

const TABS = ["Executive Summary", "Driver Rankings", "Carrier Rankings", "Store Rankings", "Detractor Review", "Upload / Refresh"];

function App() {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("Upload / Refresh");
  const [filters, setFilters] = useState({});
  const [useNeutral, setUseNeutral] = useState(false);
  const [autoLoading, setAutoLoading] = useState(true);

  useEffect(() => {
    loadFromSupabase().then((d) => {
      if (d.ltrRows.length || d.spRows.length) { setData(d); setTab("Executive Summary"); }
    }).catch(() => {}).finally(() => setAutoLoading(false));
  }, []);

  const options = useMemo(() => {
    if (!data) return {};
    return {
      weekEnding: [...new Set([...data.speRows.map((r) => r.weekEnding), ...data.spRows.map((r) => r.weekEnding)])].filter(Boolean).sort(),
      carrier: [...new Set([...data.ltrRows.map((r) => r.carrier), ...data.spRows.map((r) => r.carrier)])].filter(Boolean).sort(),
      region: [...new Set([...data.speRows.map((r) => r.region), ...data.spRows.map((r) => r.region)])].filter(Boolean).sort(),
      district: [...new Set([...data.speRows.map((r) => r.district), ...data.spRows.map((r) => r.district)])].filter(Boolean).sort(),
    };
  }, [data]);

  if (autoLoading) {
    return (
      <div style={{ minHeight: "100vh", background: "#060f1e", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 }}>
        <div style={{ color: "#38bdf8", fontSize: 32 }}>📊</div>
        <div style={{ color: "#94a3b8", fontSize: 16 }}>Loading data from Supabase...</div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: "#060f1e", fontFamily: "'Inter','Segoe UI',sans-serif", color: "#e2e8f0" }}>
      <div style={{ background: "linear-gradient(90deg,#0a1628 0%,#0f2040 100%)", borderBottom: "1px solid #1e3a5f", padding: "0 24px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 50, height: 56 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ background: "linear-gradient(135deg,#004C97,#0069C4)", borderRadius: 8, padding: "5px 10px", fontWeight: 800, fontSize: 15, color: "#fff", letterSpacing: 0.5 }}>LOWE'S</div>
          <div style={{ color: "#94a3b8", fontSize: 14 }}>Delivery Performance Dashboard</div>
        </div>
        {data && (
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ color: "#475569", fontSize: 12 }}>Composite:</span>
            <button onClick={() => setUseNeutral(false)} style={{ background: !useNeutral ? "#1e40af" : "#1e293b", color: !useNeutral ? "#93c5fd" : "#64748b", border: "1px solid #334155", borderRadius: "6px 0 0 6px", padding: "4px 12px", fontSize: 12, cursor: "pointer" }}>Strict LTR</button>
            <button onClick={() => setUseNeutral(true)} style={{ background: useNeutral ? "#1e40af" : "#1e293b", color: useNeutral ? "#93c5fd" : "#64748b", border: "1px solid #334155", borderRadius: "0 6px 6px 0", padding: "4px 12px", fontSize: 12, cursor: "pointer" }}>Neutral 8</button>
          </div>
        )}
      </div>
      <div style={{ background: "#0a1628", borderBottom: "1px solid #1e293b", padding: "0 24px", display: "flex", gap: 0, overflowX: "auto" }}>
        {TABS.map((t) => (
          <button key={t} onClick={() => setTab(t)} style={{ background: "none", border: "none", padding: "12px 18px", fontSize: 13, cursor: "pointer", whiteSpace: "nowrap", fontWeight: tab === t ? 600 : 400, color: tab === t ? "#38bdf8" : "#64748b", borderBottom: tab === t ? "2px solid #38bdf8" : "2px solid transparent" }}>{t}</button>
        ))}
      </div>
      <div style={{ background: "#0a1628", borderBottom: "1px solid #1e293b", padding: "6px 24px", display: "flex", gap: 20, alignItems: "center", flexWrap: "wrap" }}>
        {[["#22c55e", "≥95% Excellent"], ["#eab308", "90-94% Good"], ["#ef4444", "<90% Needs Attention"]].map(([c, l]) => (
          <div key={l} style={{ display: "flex", alignItems: "center", gap: 6 }}><div style={{ width: 10, height: 10, borderRadius: 2, background: c }} /><span style={{ color: "#64748b", fontSize: 11 }}>{l}</span></div>
        ))}
        <div style={{ marginLeft: "auto", color: "#475569", fontSize: 11 }}>Composite = Completion(25%) + OT Window(25%) + OT(20%) + LTR(20%) − Redelivery(10%)</div>
      </div>
      <div style={{ padding: "24px", maxWidth: 1600, margin: "0 auto" }}>
        {tab === "Upload / Refresh" && <UploadPage onLoad={(d) => { setData(d); setTab("Executive Summary"); }} />}
        {tab === "Executive Summary" && data && <ExecutiveSummary spRows={data.spRows} speRows={data.speRows} ltrRows={data.ltrRows} useNeutral={useNeutral} />}
        {tab === "Driver Rankings" && data && <DriverRankings speRows={data.speRows} ltrRows={data.ltrRows} filters={filters} setFilters={setFilters} options={options} useNeutral={useNeutral} />}
        {tab === "Carrier Rankings" && data && <CarrierRankings spRows={data.spRows} ltrRows={data.ltrRows} filters={filters} setFilters={setFilters} options={options} useNeutral={useNeutral} />}
        {tab === "Store Rankings" && data && <StoreRankings ltrRows={data.ltrRows} filters={filters} setFilters={setFilters} options={options} />}
        {tab === "Detractor Review" && data && <DetractorReview ltrRows={data.ltrRows} filters={filters} setFilters={setFilters} options={options} />}
        {!data && tab !== "Upload / Refresh" && (
          <div style={{ textAlign: "center", paddingTop: 80, color: "#475569" }}>
            <div style={{ fontSize: 40, marginBottom: 16 }}>📊</div>
            <div style={{ fontSize: 18 }}>No data loaded yet.</div>
            <button onClick={() => setTab("Upload / Refresh")} style={{ ...exportBtn, marginTop: 16, padding: "10px 24px" }}>Go to Upload</button>
          </div>
        )}
      </div>
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
} catch (err) {
  document.getElementById('root').innerHTML =
    '<div style="color:#f87171;background:#0f172a;padding:40px;font-family:sans-serif;white-space:pre-wrap;">Dashboard failed to load.\n\n' +
    String(err) + '</div>';
}
</script>
<script>
  (function() {
    try {
      var src = document.getElementById('app-source').textContent;
      var output = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
      var execScript = document.createElement('script');
      execScript.textContent = output;
      document.body.appendChild(execScript);
    } catch (err) {
      document.getElementById('root').innerHTML =
        '<div style="color:#f87171;background:#0f172a;padding:40px;font-family:monospace;white-space:pre-wrap;min-height:100vh;">Babel transform failed:\n\n' +
        String(err && err.message ? err.message : err) + '</div>';
    }
  })();
</script>
</body>
</html>
